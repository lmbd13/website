<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Lambis Dionysopoulos. Digital public infrastructure, University of Cambridge. PhD in Finance.">
    <meta name="author" content="Lambis Dionysopoulos">
    <meta property="og:title" content="Lambis Dionysopoulos">
    <meta property="og:description" content="Digital public infrastructure, University of Cambridge. PhD in Finance.">
    <meta property="og:url" content="https://dionysopoulos.org/">
    <meta property="og:type" content="website">
    <title>Lambis Dionysopoulos</title>
    <link rel="canonical" href="https://dionysopoulos.org/">
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="data:,">
    <style>
      @font-face {
        font-family: 'Verdana';
        src: url('fonts/verdana.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Verdana';
        src: url('fonts/verdana-bold.ttf') format('truetype');
        font-weight: bold;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: light dark;
        --bg:    #FAFAFA;
        --text:  #1C1C1C;
        --muted: #6B6B6B;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:    #0d1117;
          --text:  #e6edf3;
          --muted: #8b949e;
        }
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: Verdana, Tahoma, 'DejaVu Sans', Geneva, sans-serif;
        font-size: 1rem;
        line-height: 1.7;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: left;
        -webkit-font-smoothing: antialiased;
      }

      main {
        max-width: 424px;
        padding: 1rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: bold;
        margin: 0 0 0.1rem;
        white-space: nowrap;
      }

      .muted {
        color: var(--muted);
        margin: 0;
      }

      p {
        margin: 1rem 0 0;
      }

      a {
        text-underline-offset: 3px;
      }

      @media (prefers-color-scheme: dark) {
        a         { color: #58a6ff; }
        a:visited { color: #a371f7; }
        a:hover   { color: #79c0ff; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lambis Dionysopoulos, PhD</h1>
      <p class="muted">Updated 10 June 2026</p>
      <p>I work on digital public infrastructure at the University of Cambridge.</p>
      <p>PhD in Finance. Research on how technology, markets, and institutions shape one another.</p>
      <p><a href="/">Full site</a>.</p>
    </main>
  </body>
</html>
